<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Cool Gallery</title>

    <!-- High-end elegant typography: Playfair for headings, Inter for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">

    <style>
        /* === CSS STYLING === */
        :root {
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            --accent: #d2a679; /* Elegant gallery gold/tan */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- Background Art Gallery Frames --- */
        .gallery-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .frame {
            position: absolute;
            background: #fff;
            border: 8px solid #ffffff;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.04),
                inset 0 4px 10px rgba(0,0,0,0.03);
            border-radius: 2px;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Abstract empty frames in the background */
        .frame-1 { width: 180px; height: 240px; top: 10%; left: 15%; transform: rotate(-5deg); }
        .frame-2 { width: 250px; height: 180px; top: 60%; left: 8%; transform: rotate(3deg); }
        .frame-3 { width: 200px; height: 280px; top: 15%; right: 12%; transform: rotate(6deg); }
        .frame-4 { width: 150px; height: 150px; bottom: 15%; right: 20%; transform: rotate(-4deg); }

        /* Inside the frame to look like a blank canvas */
        .frame::after {
            content: '';
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }

        /* --- Main Content Card --- */
        .card-container {
            position: relative;
            z-index: 10;
            background: var(--card-bg);
            padding: 4rem 3.5rem;
            border-radius: 1px; /* Sharp, modern art-card edges */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
            max-width: 550px;
            width: 90%;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        /* Little decorative line at the top */
        .card-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background-color: var(--accent);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 7rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: -2px;
        }

        .oops {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-style: italic;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }

        .message {
            font-size: 1.05rem;
            font-weight: 300;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .highlight {
            color: var(--text-main);
            font-weight: 500;
        }

        /* Polished Minimalist Button */
        .btn {
            display: inline-block;
            padding: 14px 40px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: var(--card-bg);
            background: var(--text-main);
            border: 1px solid var(--text-main);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.4s ease;
        }

        .btn:hover {
            background: transparent;
            color: var(--text-main);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .frame-1 { left: -5%; }
            .frame-3 { right: -5%; }
            .error-code { font-size: 5rem; }
            .card-container { padding: 3rem 2rem; }
        }
    </style>
</head>
<body>

    <!-- Floating Background Frames -->
    <div class="gallery-bg">
        <div class="frame frame-1" data-speed="2"></div>
        <div class="frame frame-2" data-speed="-3"></div>
        <div class="frame frame-3" data-speed="1.5"></div>
        <div class="frame frame-4" data-speed="-2"></div>
    </div>

    <!-- Main Masterpiece Card -->
    <div class="card-container">
        <h1 class="error-code">404</h1>
        <h2 class="oops">Oops!</h2>
        <p class="message">
            <span class="highlight">Cool Gallery</span> is currently under maintenance.<br>
            We will be back on display soon<span id="dots"></span>
        </p>
        <a href="#" class="btn" onclick="window.location.reload();">Refresh Gallery</a>
    </div>

    <script>
        /* === JAVASCRIPT === */

        // 1. Elegant subtle dot animation
        const dotsElement = document.getElementById('dots');
        let dotCount = 0;

        setInterval(() => {
            dotCount = (dotCount + 1) % 4; // Cycles 0 to 3
            dotsElement.innerText = '.'.repeat(dotCount);
        }, 600); 

        // 2. Parallax effect for the background frames
        const frames = document.querySelectorAll('.frame');

        document.addEventListener('mousemove', (e) => {
            // Calculate mouse position relative to the center of the screen
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;

            frames.forEach(frame => {
                // Get the speed from the data attribute in the HTML
                const speed = frame.getAttribute('data-speed');
                
                // Calculate the subtle movement
                const moveX = x * speed;
                const moveY = y * speed;

                // Apply movement while keeping the frame's original rotation
                // We use computed style to grab the base rotation applied in CSS
                const style = window.getComputedStyle(frame);
                const transform = style.getPropertyValue('transform');
                
                // If it's a matrix (which is how the browser calculates rotate), we append the translation
                if (transform !== 'none') {
                    frame.style.transform = `translate(${moveX}px, ${moveY}px) ${transform.split(' translate')[0]}`;
                } else {
                    frame.style.transform = `translate(${moveX}px, ${moveY}px)`;
                }
            });
        });
    </script>

</body>
</html>
