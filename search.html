<style>

    .hero-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: flex-end; opacity: 0; animation: heroFade 18s infinite; }
    .hero-slide::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%); pointer-events: none; }

    .slide-2 { background-image: url('https://images.unsplash.com/photo-1600607687920-4e2a09be15c7?w=600&auto=format&fit=crop'); animation-delay: 3s; }
    .slide-3 { background-image: url('https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=600&auto=format&fit=crop'); animation-delay: 6s; }
    .slide-4 { background-image: url('https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=600&auto=format&fit=crop'); animation-delay: 9s; }
    .slide-5 { background-image: url('https://images.unsplash.com/photo-1517849845537-4d257902454a?w=600&auto=format&fit=crop'); animation-delay: 12s; }
    .slide-6 { background-image: url('https://images.unsplash.com/photo-1540932239986-30128078f3c5?w=600&auto=format&fit=crop'); animation-delay: 15s; }

    .dot { width: 8px; height: 8px; border-radius: 50%; background-color: #d1d1d1; }
    .dot-1 { animation: dotFade 18s infinite 0s; } .dot-2 { animation: dotFade 18s infinite 3s; } .dot-3 { animation: dotFade 18s infinite 6s; } 
    .dot-4 { animation: dotFade 18s infinite 9s; } .dot-5 { animation: dotFade 18s infinite 12s; } .dot-6 { animation: dotFade 18s infinite 15s; }
    @keyframes dotFade { 0%, 14% { background-color: #111111; transform: scale(1.2); } 17%, 100% { background-color: #d1d1d1; transform: scale(1); } }
    .featured-section { padding: 8px 0 20px 0; }
    .featured-header { padding: 0 16px; margin-bottom: 12px; }
    .featured-subtitle { font-size: 14px; color: #111; margin-bottom: 4px; }
    .featured-title { font-size: 24px; font-weight: 700; color: #111; letter-spacing: -0.3px; }
    .boards-scroller { display: flex; gap: 12px; padding: 0 16px; overflow-x: auto; scroll-snap-type: x mandatory; -ms-overflow-style: none; scrollbar-width: none; }
    .boards-scroller::-webkit-scrollbar { display: none; }
    .board-card { min-width: 88%; height: 220px; border-radius: 20px; overflow: hidden; display: flex; gap: 2px; scroll-snap-align: center; }
    .board-main-img { flex: 2.2; height: 100%; } .board-sub-imgs { flex: 1; display: flex; flex-direction: column; gap: 2px; height: 100%; }

    .ideas-list-container { padding: 16px; display: flex; flex-direction: column; gap: 36px; }
    .ideas-header-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; }
    .ideas-text { flex: 1; padding-right: 16px; }
    .ideas-text .subtitle { font-size: 15px; color: #111; margin-bottom: 4px; }
    .ideas-text .title { font-size: 26px; font-weight: 700; color: #111; line-height: 1.15; letter-spacing: -0.5px; }
    .ideas-search-btn { width: 48px; height: 48px; background-color: #efefef; border-radius: 16px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    .ideas-grid { display: flex; gap: 2px; border-radius: 16px; overflow: hidden; height: 130px; }
    .ideas-grid img { flex: 1; width: 25%; height: 100%; object-fit: cover; background-color: #e0e0e0; cursor: pointer; }
    .typing-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 300; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; flex-direction: column; }
    .typing-overlay.active { transform: translateY(0); }
    .typing-header { display: flex; align-items: center; padding: 16px; gap: 12px; transition: all 0.3s ease; }
    .typing-back-btn { font-size: 28px; color: #111; cursor: pointer; }
    .typing-input-bar { flex: 1; background: #efefef; border-radius: 30px; height: 48px; display: flex; align-items: center; padding: 0 16px; position: relative; transition: all 0.3s ease; }
    .typing-input-bar input { flex: 1; border: none; background: transparent; outline: none; font-size: 16px; color: #111; width: 100%; padding-right: 36px; }
    .typing-search-icon { position: absolute; right: 16px; font-size: 20px; color: #111; cursor: pointer; }
    .recent-searches-area { padding: 16px; color: #111; flex: 1; overflow-y: auto; }
    .recent-searches-area.hidden { display: none; }
    .injected-results-area { flex: 1; display: none; flex-direction: column; overflow: hidden; background: #ffffff; }
    .injected-results-area.active { display: flex; }
</style>

<div class="search-page">
    <div class="search-bar-container" id="main-search-trigger">
        <ion-icon name="search"></ion-icon><div class="search-input-placeholder">Search server DB...</div><ion-icon name="camera-outline"></ion-icon>
    </div>

    <!-- Hero Content -->
    <div class="search-hero-wrapper">
        <div class="hero-slide slide-1"><div class="hero-text-content"><div class="hero-subtitle">Coastal cool</div><div class="hero-title">Beach-inspired decor</div></div></div>
        <div class="hero-slide slide-2"><div class="hero-text-content"><div class="hero-subtitle">Minimalist living</div><div class="hero-title">Modern room ideas</div></div></div>
        <div class="hero-slide slide-3"><div class="hero-text-content"><div class="hero-subtitle">Cozy spaces</div><div class="hero-title">Apartment therapy</div></div></div>
        <div class="hero-slide slide-4"><div class="hero-text-content"><div class="hero-subtitle">Interior design</div><div class="hero-title">Vintage aesthetics</div></div></div>
    </div>
    <div class="carousel-dots"><div class="dot dot-1"></div><div class="dot dot-2"></div><div class="dot dot-3"></div><div class="dot dot-4"></div></div>

    <!-- Universal Typing Overlay -->
    <div class="typing-overlay" id="typing-overlay">
        <div class="typing-header" id="overlay-header">
            <ion-icon name="arrow-back" class="typing-back-btn" id="overlay-back-btn"></ion-icon>
            <div class="typing-input-bar">
                <input type="text" id="actual-input" placeholder="Search for ideas" autocomplete="off">
                <ion-icon name="search" class="typing-search-icon" id="action-search-icon"></ion-icon>
            </div>
        </div>
        
        <div class="recent-searches-area" id="recent-searches-area">
            <h3>Recent searches</h3>
        </div>

        <div class="injected-results-area" id="injected-results-area"></div>
    </div>
</div>

<script>
    (function() {
        const overlay = document.getElementById('typing-overlay');
        const input = document.getElementById('actual-input');
        const recentArea = document.getElementById('recent-searches-area');
        const resultsArea = document.getElementById('injected-results-area');
        const backBtn = document.getElementById('overlay-back-btn');
        const searchIconBtn = document.getElementById('action-search-icon');
        let isShowingResults = false;

        document.getElementById('main-search-trigger').addEventListener('click', () => {
            overlay.classList.add('active'); navigateToRecentSearches();
            setTimeout(() => input.focus(), 300);
        });

        backBtn.addEventListener('click', () => { overlay.classList.remove('active'); input.value = ''; });

        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') triggerSearch(e.target.value); });
        searchIconBtn.addEventListener('click', () => triggerSearch(input.value));
        input.addEventListener('click', () => { if (isShowingResults) navigateToRecentSearches(); });

        function navigateToRecentSearches() {
            isShowingResults = false;
            resultsArea.classList.remove('active'); recentArea.classList.remove('hidden');
            backBtn.style.display = 'block'; searchIconBtn.style.display = 'block';
            input.style.paddingRight = '36px'; 
        }

        async function triggerSearch(query) {
            if (!query.trim()) return;
            input.value = query; input.blur();
            isShowingResults = true;
            recentArea.classList.add('hidden'); resultsArea.classList.add('active');
            backBtn.style.display = 'none'; searchIconBtn.style.display = 'none'; input.style.paddingRight = '0';
            
            resultsArea.innerHTML = '<div style="padding:40px; text-align:center; color:#555;">Loading DB results...</div>';
            
            try {
                const response = await fetch('search_results.html');
                if(!response.ok) throw new Error("Could not load fragment");
                resultsArea.innerHTML = await response.text();
                
                // Re-inject scripts to run API fetch loop in fragment
                const scripts = resultsArea.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript).parentNode.removeChild(newScript);
                });
            } catch (error) {
                resultsArea.innerHTML = `<div style="padding:40px; text-align:center; color:#555;">Error.</div>`;
            }
        }
    })();
</script>
